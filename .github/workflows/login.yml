name: WhatsApp Login Pairing
on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install @whiskeysockets/baileys pino

      - name: Run Login Script
        run: |
          cat << 'EOF' > index.js
          const { default: makeWASocket, useMultiFileAuthState, Browsers, delay } = require('@whiskeysockets/baileys');
          const pino = require('pino');

          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('auth_info');
              const sock = makeWASocket({ 
                  auth: state, 
                  logger: pino({ level: 'silent' }), 
                  browser: Browsers.ubuntu('Chrome') 
              });

              sock.ev.on('creds.update', saveCreds);

              if (!sock.authState.creds.registered) {
                  await delay(5000); // සර්වර් එකට කනෙක්ට් වෙන්න තත්පර 5ක් ඉමු
                  try {
                      // ඔයාගේ නම්බර් එක මෙතන තියෙනවා
                      let code = await sock.requestPairingCode("94766886046");
                      console.log('\n\n========================================');
                      console.log('ඔයාගේ WHATSAPP PAIRING CODE එක මෙන්න:');
                      console.log('CODE: ' + code);
                      console.log('========================================\n\n');
                  } catch (err) {
                      console.log('Pairing Error:', err.message);
                  }
              }

              sock.ev.on('connection.update', (update) => {
                  if (update.connection === 'open') {
                      console.log('✅ CONNECTED SUCCESS!');
                      process.exit(0);
                  }
              });
          }
          start();
          EOF
          
          # කෝඩ් එක ගහනකම් විනාඩි 5ක් රන් වෙන්න ඉඩ දෙමු
          node index.js & sleep 300
