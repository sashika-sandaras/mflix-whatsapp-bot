name: WhatsApp Login
on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install @whiskeysockets/baileys pino qrcode-terminal

      - name: Run Login Script
        run: |
          cat << 'EOF' > index.js
          const { default: makeWASocket, useMultiFileAuthState, Browsers, delay } = require('@whiskeysockets/baileys');
          const pino = require('pino');
          const qrcode = require('qrcode-terminal');

          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('auth_info');
              const sock = makeWASocket({ 
                  auth: state, 
                  logger: pino({ level: 'silent' }), 
                  // මෙතන අලුත්ම Browser Version එකක් පාවිච්චි කරනවා
                  browser: ["Ubuntu", "Chrome", "110.0.5481.178"] 
              });

              sock.ev.on('creds.update', saveCreds);

              sock.ev.on('connection.update', async (update) => { 
                  const { connection, qr } = update;
                  
                  if (qr) {
                      console.log('\n--- පහත QR එක WhatsApp එකෙන් SCAN කරන්න ---\n');
                      qrcode.generate(qr, { small: true });
                      console.log('\n--- විනාඩි 5ක් ඇතුළත SCAN කරන්න ---\n');
                  }

                  if (connection === 'open') {
                      console.log('\n✅ CONNECTED SUCCESS!');
                      process.exit(0);
                  }
              });
          }
          start();
          EOF
          
          # විනාඩි 5ක් පණගන්වා තබමු
          node index.js & sleep 300
