name: WhatsApp Login
on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install @whiskeysockets/baileys pino qrcode-terminal

      - name: Run Login Script
        run: |
          echo "const { default: makeWASocket, useMultiFileAuthState, Browsers } = require('@whiskeysockets/baileys');
          const pino = require('pino');
          const qrcode = require('qrcode-terminal');
          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('auth_info');
              const sock = makeWASocket({ 
                  auth: state, 
                  printQRInTerminal: true, 
                  logger: pino({ level: 'silent' }), 
                  browser: Browsers.macOS('Desktop') 
              });
              sock.ev.on('creds.update', saveCreds);
              sock.ev.on('connection.update', (update) => { 
                  const { connection } = update;
                  if (connection === 'open') console.log('✅ CONNECTED SUCCESS!'); 
              });
          } start();" > index.js
         - name: Run Login Script
        run: |
          # මෙතනින් විනාඩි 5ක් QR එක පෙන්වනවා
          timeout 300 node index.js || true
