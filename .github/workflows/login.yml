name: WhatsApp Login
on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install @whiskeysockets/baileys pino

      - name: Run Login Script
        run: |
          cat << 'EOF' > index.js
          const { default: makeWASocket, useMultiFileAuthState, Browsers, delay, DisconnectReason } = require('@whiskeysockets/baileys');
          const pino = require('pino');

          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('auth_info');
              const sock = makeWASocket({ 
                  auth: state, 
                  logger: pino({ level: 'silent' }), 
                  browser: Browsers.macOS('Desktop'),
                  printQRInTerminal: false
              });

              // --- ඔයාගේ නම්බර් එක මෙතනට දාන්න (947XXXXXXXX) ---
              let phoneNumber = "947XXXXXXXX"; 
              // ----------------------------------------------

              sock.ev.on('connection.update', async (update) => {
                  const { connection, lastDisconnect, qr } = update;

                  if (connection === 'close') {
                      let reason = lastDisconnect?.error?.output?.statusCode;
                      console.log('සම්බන්ධතාවය බිඳ වැටුණා. හේතුව:', reason);
                      if (reason !== DisconnectReason.loggedOut) start();
                  } 
                  
                  else if (connection === 'open') {
                      console.log('\n✅ CONNECTED SUCCESS!');
                  }
              });

              sock.ev.on('creds.update', saveCreds);

              // පින් එක ඉල්ලීමට පෙර තත්පර 10ක් රැඳී සිටීම
              if (!sock.authState.creds.registered) {
                  await delay(10000); 
                  try {
                      let code = await sock.requestPairingCode(phoneNumber);
                      console.log('\n\n--- මෙන්න ඔයාගේ PAIRING CODE එක ---\n\n');
                      console.log('CODE:', code);
                      console.log('\n\n--- මේ කෝඩ් එක WHATSAPP එකේ ගහන්න ---\n\n');
                  } catch (err) {
                      console.log('Pairing Error:', err.message);
                  }
              }
          }
          start();
          EOF
          # විනාඩි 5ක් (300s) පණගන්වා තබමු
          node index.js & sleep 300
