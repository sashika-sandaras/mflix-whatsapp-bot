name: WhatsApp Login
on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize and Install
        run: |
          npm init -y
          npm install @whiskeysockets/baileys pino qrcode-terminal

      - name: Run Login Script
        run: |
          cat << 'EOF' > index.js
          const { default: makeWASocket, useMultiFileAuthState, Browsers } = require('@whiskeysockets/baileys');
          const pino = require('pino');
          const qrcode = require('qrcode-terminal');

          async function start() {
              try {
                  const { state, saveCreds } = await useMultiFileAuthState('auth_info');
                  const sock = makeWASocket({ 
                      auth: state, 
                      logger: pino({ level: 'silent' }), 
                      browser: Browsers.macOS('Desktop') 
                  });

                  sock.ev.on('creds.update', saveCreds);

                  sock.ev.on('connection.update', (update) => { 
                      const { connection, qr } = update;
                      if (qr) {
                          console.log('\n\n--- පල්ලෙහා තියෙන QR එක SCAN කරන්න ---\n\n');
                          qrcode.generate(qr, { small: true });
                          console.log('\n\n--- විනාඩි 5ක් ඇතුළත SCAN කරන්න ---\n\n');
                      }
                      if (connection === 'open') {
                          console.log('\n✅ CONNECTED SUCCESS!');
                          // මෙතනදී විනාඩියක් ඉන්නවා ලොගින් එක සේව් වෙන්න
                          setTimeout(() => { process.exit(0); }, 60000);
                      }
                  });
              } catch (err) {
                  console.log('Error:', err);
              }
          }
          start();
          EOF
          
          # මෙතනින් විනාඩි 5ක් වැඩේ පණගන්වා තබයි
          node index.js & sleep 300
