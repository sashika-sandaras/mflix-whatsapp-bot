name: WhatsApp Login
on: workflow_dispatch
jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Dependencies
        run: npm install @whiskeysockets/baileys pino qrcode-terminal
      - name: Run Login Script
        run: |
          echo "const { default: makeWASocket, useMultiFileAuthState, Browsers } = require('@whiskeysockets/baileys');
          const pino = require('pino');
          const qrcode = require('qrcode-terminal');
          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('auth_info');
              const sock = makeWASocket({ auth: state, printQRInTerminal: true, logger: pino({ level: 'silent' }), browser: Browsers.macOS('Desktop') });
              sock.ev.on('creds.update', saveCreds);
              sock.ev.on('connection.update', (update) => { if (update.connection === 'open') console.log('✅ CONNECTED!'); });
          } start();" > index.js
          node index.js
