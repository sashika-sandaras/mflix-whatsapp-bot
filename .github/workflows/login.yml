name: WhatsApp Login
on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install @whiskeysockets/baileys pino

      - name: Run Login Script
        run: |
          cat << 'EOF' > index.js
          const { default: makeWASocket, useMultiFileAuthState, Browsers, delay } = require('@whiskeysockets/baileys');
          const pino = require('pino');

          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('auth_info');
              const sock = makeWASocket({ 
                  auth: state, 
                  logger: pino({ level: 'silent' }), 
                  browser: Browsers.macOS('Desktop') 
              });

              // --- මෙතනට ඔයාගේ WhatsApp අංකය දාන්න (94xxxxxxxx) ---
              let phoneNumber = "947XXXXXXXX"; // ඔයාගේ නම්බර් එක මෙතනට දාන්න
              // ----------------------------------------------

              if (!sock.authState.creds.registered) {
                  await delay(3000);
                  let code = await sock.requestPairingCode(phoneNumber);
                  console.log('\n\n--- මෙන්න ඔයාගේ PAIRING CODE එක ---\n\n');
                  console.log('CODE:', code);
                  console.log('\n\n--- මේ කෝඩ් එක WHATSAPP එකේ ගහන්න ---\n\n');
              }

              sock.ev.on('creds.update', saveCreds);
              sock.ev.on('connection.update', (update) => { 
                  if (update.connection === 'open') {
                      console.log('\n✅ CONNECTED SUCCESS!');
                      setTimeout(() => { process.exit(0); }, 10000);
                  }
              });
          }
          start();
          EOF
          node index.js
